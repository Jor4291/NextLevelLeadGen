# Next Level Studio ICP configuration — industries, keywords, scoring weights

thresholds:
  hot: 65
  qualified: 50
  review: 35
  min_persist: 25
  evidence_floor: 40

scoring_weights:
  industry_match: 15
  employee_sweet_spot: 20
  process_opt_pain: 25
  custom_software_pain: 25
  hiring_signal: 10
  contact_quality: 5
  decision_maker: 5
  named_email: 2
  positive_keyword: 12
  negative_keyword: 8

negative_weights:
  no_website: 8
  no_contact: 5
  employee_out_of_band: 10

employee_bands:
  sweet_spot_min: 15
  sweet_spot_max: 250
  acceptable_min: 5
  acceptable_max: 1000

disqualifier_keywords:
  - staffing agency
  - recruiting firm
  - software consulting
  - marketing agency
  - web design agency
  - saas platform
  - cloud software vendor
  - franchise opportunity
  - equipment dealer
  - authorized reseller
  - distributor only

