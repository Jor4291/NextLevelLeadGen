services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nextlevel
      POSTGRES_PASSWORD: nextlevel
      POSTGRES_DB: leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextlevel -d leads"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://nextlevel:nextlevel@db:5432/leads
      AUTH_REQUIRED: "true"
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    volumes:
      - ./credentials:/app/credentials:ro
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
